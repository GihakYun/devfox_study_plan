<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新規投稿</title>
    <link rel="stylesheet" th:href="@{/css/default.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/content.css}" />
    <link rel="stylesheet" th:href="@{/css/button.css}" />
</head>
<body>
    <div class="page_tits">
            <h3>掲示板管理</h3>
            <p class="path"><strong>現在位置 :</strong> <span>掲示板管理</span> <span>リスト型</span> <span>新規投稿</span></p>
        </div>

        <div class="content">
            <section>
                <form action="/board/save" id="saveForm" method="post" autocomplete="off">
                	<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                
                    <input type="hidden" id="id" name="id" th:if="${post != null}" th:value="${post.id}" />

                    <table class="tb tb_row">
                        <colgroup>
                            <col style="width:15%;" /><col style="width:35%;" /><col style="width:15%;" /><col style="width:35%;" />
                        </colgroup>
                        <tbody>
                            <tr>
                                <th>タイトル <span class="es">必須入力</span></th>
                                <td colspan="3"><input type="text" id="title" name="title" maxlength="50" placeholder="タイトルを入力してください。" /></td>
                            </tr>

                            <tr>
                                <th>名前 <span class="es">必須入力</span></th>
                                <td colspan="3"><input type="text" id="writer" name="writer" maxlength="10" placeholder="名前を入力してください。" /></td>
                            </tr>

                            <tr>
                                <th>内容 <span class="es">必須入力</span></th>
                                <td colspan="3"><textarea id="content" name="content" cols="50" rows="10" placeholder="内容を入力してください。"></textarea></td>
                            </tr>
                        </tbody>
                    </table>
                <p class="btn_set">
                    <button type="submit" id="saveBtn" class="btns btn_st3 btn_mid">保存</button>
                    <button type="button" class="btns btn_bdr3 btn_mid" onclick="history.back();">戻る</button>
                </p>
                </form>
            </section>
        </div> <!--/* .content */-->
</body>
</html>
