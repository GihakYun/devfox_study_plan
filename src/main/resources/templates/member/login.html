<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/default.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/content.css}" />
    <link rel="stylesheet" th:href="@{/css/button.css}" />
	<style>
		#login_box .signup_btn {background:#42d870; border:0; border-bottom:solid 3px #4ed177; border-radius:50px; width:100%; height:52px; line-height:52px; font-size:16px; color:#fff; text-align:center; margin:20px 0 15px;}
	</style>
</head>

<body>
	<div id="login_wrap">
		<div id="login_box">
			<div class="login_con">
				<div class="login_tit">
					<h2>掲示板フロジェクト</h2>
					<p>LOG<i>IN</i></p>
				</div>

				<div class="login_input">
					<form id="loginForm" action="/login" method="post">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<ul>
							<li>
								<label for="loginId" class="skip_info">ID</label>
								<input type="text" id="loginId" name="loginId" title="ログインid" />
							</li>
							<li>
								<label for="password" class="skip_info">PASSWORD</label>
								<input type="password" id="password" name="password" title="パスワード" />
							</li>
						</ul>
						<button type="submit" class="login_btn">LOGIN</button>
						<button type="submit" formaction="/signup" formmethod="get" class="signup_btn">SignUp</button>
					</form>
				</div>
			</div>
		</div>
	</div>
	</div>
	
</body>
</html>
