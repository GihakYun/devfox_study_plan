<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掲示板修正</title>
    <link rel="stylesheet" th:href="@{/css/default.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/content.css}" />
    <link rel="stylesheet" th:href="@{/css/button.css}" />
</head>
<body>
    <div class="page_tits">
            <h3>修正</h3>
            <p class="path"><strong>現在位置 :</strong> <span>掲示板管理</span> <span>リスト型</span> <span>投稿修正</span></p>
        </div>

    <div class="content">
        <section>
            <form action="/board/update" id="saveForm" method="post" autocomplete="off">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
                <input type="hidden" id="id" name="id" th:if="${board != null}" th:value="${board.id}" />

                <table class="tb tb_row">
                    <colgroup>
                        <col style="width:15%;" /><col style="width:35%;" /><col style="width:15%;" /><col style="width:35%;" />
                    </colgroup>
                    <tbody>
                        <tr>
                            <th>タイトル <span class="es">必須入力</span></th>
                            <td colspan="3"><input type="text" id="title" name="title" maxlength="50" th:value="${board.title}" /></td>
                        </tr>

                        <tr>
                            <th>名前 <span class="es">必須入力</span></th>
                            <td colspan="3"><input type="text" id="writer" name="writer" maxlength="10" th:value="${board.writer}" /></td>
                        </tr>

                        <tr>
                            <th>内容 <span class="es">必須入力</span></th>
                            <td colspan="3"><textarea id="content" name="content" cols="50" rows="10" th:text="${board.content}"></textarea></td>
                        </tr>
                    </tbody>
                </table>
            <p class="btn_set">
                <button type="submit" id="saveBtn" class="btns btn_st3 btn_mid">保存</button>
                <button type="button" class="btns btn_bdr3 btn_mid" onclick="history.back();">戻る</button>
            </p>
            </form>
        </section>
    </div> <!--/* .content */-->
</body>
</html>
