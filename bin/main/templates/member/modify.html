<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" th:href="@{/css/default.css}" />
    <link rel="stylesheet" th:href="@{/css/common.css}" />
    <link rel="stylesheet" th:href="@{/css/content.css}" />
    <link rel="stylesheet" th:href="@{/css/button.css}" />
</head>
<body>
	<h1>Modify</h3>
		<div class="pop_container">
			<form id="modfiyForm" action="/member/modify" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
				<table class="tb tb_row tl">
					<colgroup>
						<col style="width:30%;" /><col style="width:70%;" />
					</colgroup>
					<tbody>
						<tr>
							<th scope="row">ID<span class="es">必須</span></th>
							<td>
								<input type="text" name="loginId" th:value="${member.loginId}" maxlength="20" style="width: 80%;" readonly="readonly"/>
							</td>
						</tr>
						<tr>
							<th scope="row">PASSWORD<span class="es">必須</span></th>
							<td><input type="password" name="password" th:value="${member.password}" maxlength="30"/></td>
						</tr>
						<tr>
							<th scope="row">名前<span class="es">必須</span></th>
							<td><input type="text" name="name" th:value="${member.name}" maxlength="10" readonly="readonly"/></td>
						</tr>
					
						<tr>
							<th scope="row">生年月日<span class="es">必須</span></th>
							<td><input type="date" name="birthday" th:value="${member.birthday}" readonly="readonly"></td>
						</tr>
					</tbody>
				</table>
			<p class="btn_set">
				<button type="submit" class="btns btn_st2">修正</button>
				<button type="button" class="btns btn_bdr2" onclick="history.back();">キャンセル</button>
			</p>
			</form>
		</div>
</body>
</html>
